kind: Service
apiVersion: v1
metadata:
  name: ans
  namespace: default
spec:
  type: ClusterIP
  selector:
    app: ans
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080

--- 

apiVersion: v1
kind: Service
metadata:
  name: ans
  namespace: default
spec:
  type: LoadBalancer
  selector:
    app: ans
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: ans
  labels:
    app: ans
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ans
  template:
    metadata:
      labels:
        app: ans
    spec:
      containers:
        - name: ans
          image: mlrosenquist/aspnetshutdown:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
          - name: loki
            value: http://loki:3100